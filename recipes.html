<h1>สูตรแต่ง</h1>

<table id="table">

<tr>

<th>รถ</th>
<th>ลูกสูบ</th>
<th>แคม</th>
<th>คาบู</th>
<th>แรงม้า</th>

</tr>

</table>

<script>

fetch("data/recipes.json")

.then(r=>r.json())

.then(data=>{

let table=document.getElementById("table")

data.forEach(r=>{

table.innerHTML+=`

<tr>

<td>${r.bike}</td>
<td>${r.piston}</td>
<td>${r.cam}</td>
<td>${r.carb}</td>
<td>${r.hp}</td>

</tr>

`

})

})

</script>
